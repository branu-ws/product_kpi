kpi:
  feature_thresholds:
    工程作成:       {good_min: 20, normal_min: 5}
    出面:           {good_min: 10, normal_min: 3}
    出来高:         {good_min: 10, normal_min: 3}
    ホワイトボード: {good_min: 10, normal_min: 3}
    日報:           {good_min: 10, normal_min: 3}
    報告書:         {good_min: 10, normal_min: 3}
  keiei_feature_thresholds:
    案件ステータス更新: {good_min: 2, normal_min: 1}
    見積原価登録:       {good_min: 2, normal_min: 1}
    見積売上登録:       {good_min: 2, normal_min: 1}
    実績原価登録:       {good_min: 2, normal_min: 1}
    実績売上登録:       {good_min: 2, normal_min: 1}
    請求書発行:         {good_min: 2, normal_min: 1}
    OCR処理:            {good_min: 2, normal_min: 1}
    原価ページPV:       {good_min: 2, normal_min: 1}
  tier:
    rolling_months:        3   # fan/proactive 判定のローリング期間 (月)
    weekly_window:        12   # 週次表示・スコア正規化の対象週数
    avg_months:           12   # 稼働日平均の参照月数 (日次閾値の基準)
    fan_feature_min:       2   # 単一プロダクト fan: normal 以上の機能数の最小値
    proactive_feature_min: 1   # 単一プロダクト proactive: 同上
    xproduct_score_min:    1   # X-Product fan/proactive: 各プロダクトスコアの最小値
    usage_freq_good:       5   # usage_freq good: feature_score の最小値
    usage_freq_normal:     3   # usage_freq normal: 同上
  plan_type_codes:
    business:        plus
    business_annual: plus
    personal_annual: mini
  active_plan_types: [plus]  # "mini" を追加すれば mini も分析対象に含まれる

redash:
  base_url: "https://redash.careecon.jp"
  data_sources:
    db:   1   # careecon_db (MySQL) — companies マスタ
    cas:  2   # careecon_cas (MySQL) — contracts, items, accounts
    work: 7   # careecon_work (MySQL) — 施工管理・経営管理 利用履歴
    sf:   11  # Salesforce — Account, Product__c など
  saved_queries:
    work_user_history: 914   # Redash 保存クエリ (施工管理利用履歴)

schedule:
  cron: "0 2 * * 1"    # 毎週月曜 02:00 JST BigQuery/Notion更新

notification: #Error 発生時通知メール
  email:
    - t.tsuyama@branu.jp

gcp:
  project_id: "product-department-496703"
  bq_dataset: "kpi"
  region: "asia-northeast1"
  job_name: "kpi-pipeline-job"

notion:
  months_to_show: 18    # 横展開する月数
  outputs:
    - name: "cross_product"
      sql: "collections/notion/cross_product/cross_product_combined_matrix.sql"
      db_id: "3829cbb2313080df95e2c8b0756f01f4"
      ds_id: "3829cbb2-3130-80f1-a11f-000be4b6b8b7"
      time_col: "combined"
    - name: "work_single_product_usage"
      sql: "collections/notion/work/single_product_matrix.sql"
      db_id: "3839cbb231308064b927d0f426943948"
      ds_id: "3839cbb2-3130-8093-802b-000be632b233"
      time_col: "combined"
    - name: "keiei_single_product_usage"
      sql: "collections/notion/keiei/single_product_matrix.sql"
